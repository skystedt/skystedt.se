approvedGitRepositories: [] #  Don't allow any git repositories urls
defaultSemverRangePrefix: '' # Don't add ^ to semver ranges by default
enableGlobalCache: false #     Don't use the global cache
enableInlineBuilds: true #     Print build logs inline in the terminal
enableScripts: false #         Don't allow any scripts (e.g., postinstall) to be run, overrides are defined in dependenciesMeta in package.json
npmMinimalAgeGate: 0 #         Don't enforce a minimum age for packages

nodeLinker: node-modules

plugins:
  - checksum: e5e6e2885ab0e6521b70b0af7c6d8ca2c75dcae2403706fc4600a783b339a6530a476dafb9450c9436ca4050eb6bdee9b62e6e2cebfecf1e81dd709a2480dc07
    path: .yarn/plugins/@yarnpkg/plugin-engines.cjs
    spec: 'https://raw.githubusercontent.com/devoto13/yarn-plugin-engines/e6556920ba18593fb775bfcdf12fbc2af50b2642/bundles/%40yarnpkg/plugin-engines.js'

logFilters:
  # General error promotions (more are added in CI)
  - code: YN0004 # DISABLED_BUILD_SCRIPTS
    level: error

  # Noise reductions for workspace root
  - text: 'skystedt.se@workspace:. must be built because it never has been before or the last one failed'
    level: discard
  - text: 'skystedt.se@workspace:. must be rebuilt because its dependency tree changed'
    level: discard

  # eslint-config-airbnb-base
  # Configuration is extracted but the plugin is not used, so any peer dependencies are not needed
  - pattern: 'eslint * eslint-config-airbnb-base'
    level: discard
  - pattern: 'eslint-plugin-import * eslint-config-airbnb-base'
    level: discard

  # @microsoft/applicationinsights-*
  # tslib not needed as peer dependency
  # https://github.com/microsoft/ApplicationInsights-JS/issues/1800
  - pattern: 'tslib * @microsoft/applicationinsights-'
    level: discard
