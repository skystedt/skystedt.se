name: Reusable - AI Review Local

on:
  workflow_call:
    inputs:
      pr_number:
        type: number
        required: true
      notify_offline:
        type: boolean
        required: true

permissions:
  contents: read
  pull-requests: write

env:
  PENDING_MARKER: "ai-review-local:pending"
  PENDING_HEAD_MARKER: "ai-review-local:pending-head"
  REVIEW_MARKER: "ai-review-local:review"
  REVIEWED_HEAD_MARKER: "ai-review-local:reviewed-head"
  MAX_DIFF_CHARS: "120000" # keep the prompt within the local context window
  MAX_COMMENT_CHARS: "60000" # comments are limited to 65536 characters

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    timeout-minutes: 5

    # serialize per PR across triggers (pull_request and schedule), they read and write the same comments
    concurrency:
      group: ai-review-local-pr-${{ inputs.pr_number }}
      cancel-in-progress: false

    outputs:
      head_hash: ${{ steps.head.outputs.hash }}
      reviewed_hash: ${{ steps.review_comment.outputs.value }}
      pending_id: ${{ steps.queued.outputs.id || steps.status.outputs.pending_id }}
      skip: ${{ steps.status.outputs.skip }}

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0

      - name: Get Head Commit
        id: head
        run: |
          HEAD_HASH=$(gh pr view "${{ inputs.pr_number }}" --json headRefOid --jq '.headRefOid')
          echo "hash=$HEAD_HASH" >> "$GITHUB_OUTPUT"

      - name: Find Last Review Comment
        id: review_comment
        uses: ./.github/composite/marker-comment-find
        with:
          issue: ${{ inputs.pr_number }}
          marker: ${{ env.REVIEW_MARKER }}
          occurrence: last
          value-marker: ${{ env.REVIEWED_HEAD_MARKER }}

      - name: Find Pending Comment
        id: pending_comment
        uses: ./.github/composite/marker-comment-find
        with:
          issue: ${{ inputs.pr_number }}
          marker: ${{ env.PENDING_MARKER }}
          value-marker: ${{ env.PENDING_HEAD_MARKER }}

      - name: Evaluate Status
        id: status
        env:
          HEAD_HASH: ${{ steps.head.outputs.hash }}
          REVIEWED_HASH: ${{ steps.review_comment.outputs.value }}
          PENDING_ID: ${{ steps.pending_comment.outputs.id }}
          PENDING_HEAD: ${{ steps.pending_comment.outputs.value }}
        run: |
          echo "Head: $HEAD_HASH"
          echo "Last reviewed: ${REVIEWED_HASH:-none}"
          echo "Pending comment: ${PENDING_ID:-none} (head: ${PENDING_HEAD:-none})"

          # skip when the head commit has already been reviewed and no retry is pending
          SKIP=false
          if [ -n "$REVIEWED_HASH" ] && [ "$REVIEWED_HASH" = "$HEAD_HASH" ] && [ -z "$PENDING_ID" ]; then
            SKIP=true
            echo "No new commits since the last review, skipping"
          fi

          # pending comment for an older head, mark it as outdated and post a fresh one at the end
          OUTDATED=false
          if [ -n "$PENDING_ID" ] && [ "$PENDING_HEAD" != "$HEAD_HASH" ]; then
            OUTDATED=true
            echo "The pending comment is outdated"
          fi

          # post the pending marker before the review job runs, in case the review job is not finished
          POST_QUEUED=false
          if [ "$SKIP" != "true" ] && { [ "$OUTDATED" = "true" ] || { [ -z "$PENDING_ID" ] && [ "${{ inputs.notify_offline }}" = "true" ]; }; }; then
            POST_QUEUED=true
          fi

          # keep using the pending comment when it is not outdated
          KEEP_ID=""
          if [ -n "$PENDING_ID" ] && [ "$OUTDATED" != "true" ]; then
            KEEP_ID="$PENDING_ID"
          fi

          {
            echo "skip=$SKIP"
            echo "outdated=$OUTDATED"
            echo "post_queued=$POST_QUEUED"
            echo "pending_id=$KEEP_ID"
          } >> "$GITHUB_OUTPUT"

          QUEUED_TEXT="A local LLM review has been queued"

          echo "🤖 $QUEUED_TEXT" > queued.md

          {
            echo "🤖 ~~$QUEUED_TEXT~~"
            echo ""
            echo "_Superseded by an update to the pull request_"
          } > superseded.md

      - name: Supersede Outdated Pending Comment
        if: steps.status.outputs.outdated == 'true'
        uses: ./.github/composite/marker-comment-write
        with:
          issue: ${{ inputs.pr_number }}
          comment-id: ${{ steps.pending_comment.outputs.id }}
          body-file: superseded.md

      - name: Post Queued Comment
        id: queued
        if: steps.status.outputs.post_queued == 'true'
        uses: ./.github/composite/marker-comment-write
        with:
          issue: ${{ inputs.pr_number }}
          markers: |
            ${{ env.PENDING_MARKER }}
            ${{ env.PENDING_HEAD_MARKER }}=${{ steps.head.outputs.hash }}
          body-file: queued.md

  review:
    name: Local LLM Review
    needs: prepare
    if: needs.prepare.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: &job_timeout_minutes 30 # anchor

    # serialize review jobs across all PRs and triggers, they share the same WireGuard configuration
    concurrency:
      group: ai-review-local
      cancel-in-progress: false

    env:
      GH_TOKEN: ${{ github.token }}
      JOB_TIMEOUT_MINUTES: *job_timeout_minutes

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0

      - name: Connect WireGuard
        # if the tunnel cannot be established the availability check will report offline
        continue-on-error: true
        uses: ./.github/composite/wireguard-connect
        with:
          config: ${{ secrets.WIREGUARD_CONFIG }}

      - name: Check Availability
        id: availability
        run: |
          MAX_TIME=15
          URL=http://${{ secrets.LOCAL_LLM_URL }}/v1/models

          if curl -sf \
            --max-time "$MAX_TIME" \
            "$URL" > /dev/null; then

            ONLINE=true
          else
            ONLINE=false
          fi
          echo "online=$ONLINE" >> "$GITHUB_OUTPUT"
          echo "Local LLM online: $ONLINE"

          # the offline notice, posted when no review is produced
          {
            echo "🤖 The local LLM reviewer is not available right now. The review will be retried automatically."
            echo ""
            echo "_Last checked: $(date -u '+%Y-%m-%d %H:%M UTC')_"
          } > offline.md

      - name: Find Previous Review Comments
        id: reviews
        if: steps.availability.outputs.online == 'true'
        uses: ./.github/composite/marker-comment-find
        with:
          issue: ${{ inputs.pr_number }}
          marker: ${{ env.REVIEW_MARKER }}

      - name: Pull Request Data
        id: data
        if: steps.availability.outputs.online == 'true'
        env:
          HEAD_HASH: ${{ needs.prepare.outputs.head_hash }}
          REVIEWED_HASH: ${{ needs.prepare.outputs.reviewed_hash }}
        run: |
          # read title and description
          gh pr view "${{ inputs.pr_number }}" --json title,body --jq '"# " + .title + "\n\n" + (.body // "")' > pr.md

          # read full diff
          gh pr diff "${{ inputs.pr_number }}" > full_diff.patch

          # read diff since last review
          : > change_diff.patch
          if [ -n "$REVIEWED_HASH" ] && [ "$REVIEWED_HASH" != "$HEAD_HASH" ]; then
            if gh api -H "Accept: application/vnd.github.diff" "repos/{owner}/{repo}/compare/$REVIEWED_HASH...$HEAD_HASH" > change_diff.patch && [ -s change_diff.patch ]; then
              echo "update=true" >> "$GITHUB_OUTPUT"
              echo "This is an update, read the changes since the last review"
            else
              : > change_diff.patch
            fi
          fi

          # read previous review comments
          jq -r '[.[].body] | join("\n\n---\n\n") | select(length > 0)' "${{ steps.reviews.outputs.file }}" > comments.md

      - name: Limit Prompt Size
        if: steps.availability.outputs.online == 'true'
        run: |
          # keep the prompt within the size limit, drop content by priority:
          # 1. skip previous comments
          # 2. skip full diff (the changes since last review are kept)
          # 3. truncate the remaining diffs to what is left of the size limit
          total_size() { echo $(( $(wc -c < full_diff.patch) + $(wc -c < change_diff.patch) + $(wc -c < comments.md) )); }

          if [ "$(total_size)" -gt "$MAX_DIFF_CHARS" ] && [ -s comments.md ]; then
            : > comments.md
            echo "Skipped previous comments to fit the size limit"
          fi

          if [ "$(total_size)" -gt "$MAX_DIFF_CHARS" ] && [ -s change_diff.patch ] && [ -s full_diff.patch ]; then
            : > full_diff.patch
            echo "Skipped the full diff to fit the size limit, kept the changes since last review"
          fi

          for FILE in full_diff.patch change_diff.patch; do
            EXCESS=$(( $(total_size) - MAX_DIFF_CHARS ))
            SIZE=$(wc -c < "$FILE")
            if [ "$EXCESS" -gt 0 ] && [ "$SIZE" -gt 0 ]; then
              head -c "$(( SIZE > EXCESS ? SIZE - EXCESS : 0 ))" "$FILE" > "$FILE.tmp"
              mv "$FILE.tmp" "$FILE"
              printf '\n\n[the diff was truncated here because it exceeded the size limit]\n' >> "$FILE"
              echo "Truncated $FILE to fit the size limit"
            fi
          done

      - name: Build Prompt
        if: steps.availability.outputs.online == 'true'
        run: |
          {
            echo "You are a code reviewer. Your reply is posted verbatim as a single GitHub comment on the pull request."
            echo ""
            echo "Report only concrete problems in the changed code: bugs, edge cases, security issues, broken logic."
            echo ""
            echo "Format:"
            echo "- One sentence stating what the PR does."
            echo "- Then findings as short bullets, most important first, each referencing the file it applies to."
            echo "- If there is nothing to flag, write only: No issues found."
            echo ""
            echo "Do not include: praise, strengths sections, a restatement of the diff, summary tables, verdicts or merge recommendations, conclusions, generic advice (testing, monitoring, documentation), or closing offers to help."
            echo "Keep the review under 200 words unless a finding needs a code snippet to explain."
            echo ""
            echo "When reviewing an update to an already-reviewed PR, cover only the changes since the last review and do not repeat earlier findings."
          } > system.md

          {
            echo "Please review this pull request."
            echo "${{ steps.data.outputs.update == 'true' && 'This run was triggered by updates to an already-reviewed PR.' || '' }}"

            echo ""
            echo "## PR Description"
            cat pr.md

            if [ -s full_diff.patch ]; then
              echo ""
              echo "## Full diff"
              echo ""
              echo '```diff'
              cat full_diff.patch
              echo '```'
            fi

            if [ -s change_diff.patch ]; then
              echo ""
              echo "## Changes since last review"
              echo ""
              echo '```diff'
              cat change_diff.patch
              echo '```'
            fi

            if [ -s comments.md ]; then
              echo ""
              echo "## Previous review comments"
              echo ""
              # 4-backtick fence on purpose, the previous comments themselves contain 3-backtick code blocks
              echo '````markdown'
              cat comments.md
              echo '````'
            fi
          } > prompt.md

          jq -n --rawfile system system.md --rawfile prompt prompt.md '{ stream: false, messages: [{ role: "system", content: $system }, { role: "user", content: $prompt }] }' > request.json

      - name: Call Local LLM
        id: llm
        if: steps.availability.outputs.online == 'true'
        run: |
          REVIEWED=false
          MAX_TIME=$(( (JOB_TIMEOUT_MINUTES - 5) * 60 ))
          URL=http://${{ secrets.LOCAL_LLM_URL }}/v1/chat/completions

          if curl -sf \
            --max-time "$MAX_TIME" \
            -H "Content-Type: application/json" \
            -d @request.json \
            "$URL" > response.json; then

            # validate the response, an error response has no content and jq fails on invalid json
            if CONTENT=$(jq -r '.choices[0].message.content // empty' response.json 2> /dev/null) && [ -n "$CONTENT" ]; then
              REVIEWED=true
              MODEL=$(jq -r '.model // "unknown"' response.json | head -n 1)
              echo "Review by model: $MODEL"

              # the review comment
              {
                echo "## 🤖 Local LLM Review${{ steps.data.outputs.update == 'true' && ' _(update)_' || '' }}"
                echo "_Model: ${MODEL}_"
                echo ""
                printf '%s' "$CONTENT" | head -c "$MAX_COMMENT_CHARS"
              } > review.md
            else
              echo "The LLM returned an invalid or error response:"
              cat response.json
            fi
          else
            echo "The LLM call failed"
          fi
          echo "reviewed=$REVIEWED" >> "$GITHUB_OUTPUT"

      - name: Post Review Comment
        if: steps.llm.outputs.reviewed == 'true'
        uses: ./.github/composite/marker-comment-write
        with:
          issue: ${{ inputs.pr_number }}
          comment-id: ${{ needs.prepare.outputs.pending_id }}
          markers: |
            ${{ env.REVIEW_MARKER }}
            ${{ env.REVIEWED_HEAD_MARKER }}=${{ needs.prepare.outputs.head_hash }}
          body-file: review.md

      - name: Post Offline Notice
        if: steps.llm.outputs.reviewed != 'true' && (inputs.notify_offline || needs.prepare.outputs.pending_id != '')
        uses: ./.github/composite/marker-comment-write
        with:
          issue: ${{ inputs.pr_number }}
          comment-id: ${{ needs.prepare.outputs.pending_id }}
          markers: |
            ${{ env.PENDING_MARKER }}
            ${{ env.PENDING_HEAD_MARKER }}=${{ needs.prepare.outputs.head_hash }}
          body-file: offline.md
