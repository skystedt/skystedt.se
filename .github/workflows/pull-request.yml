name: Pull Request

concurrency:
  group: pull-request-${{ github.event.number }}
  cancel-in-progress: true

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  actions: read
  contents: read
  id-token: write
  pull-requests: write

jobs:
  dependency_review:
    name: Dependency Review
    uses: ./.github/workflows/reusable-dependency-review.yml

  ai_review_local:
    name: AI Review Local
    uses: ./.github/workflows/reusable-ai-review-local.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
      notify_offline: true
    secrets: inherit

  ai_review_claude:
    name: AI Review Claude Test
    uses: ./.github/workflows/reusable-ai-review-claude.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
    secrets: inherit

  build_test_and_deploy:
    name: Build, Test and Deploy
    uses: ./.github/workflows/reusable-build-test-deploy.yml
    secrets: inherit
