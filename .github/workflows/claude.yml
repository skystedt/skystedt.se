name: Claude Code - Pull Request Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  claude:
    name: Claude Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0

      - name: Claude Code
        uses: anthropics/claude-code-action@e90deca47693f9457b72f2b53c17d7c445a87342 # v1.0.171
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: |
            dependabot[bot]
          claude_args: |
            --allowedTools "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api repos/*/compare/*:*)"
            --model sonnet
            --effort high
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Please review this pull request.
            Use `gh pr diff` to see the full set of changes.

            ${{ github.event.action == 'synchronize' && 'This run was triggered by updates to an already-reviewed PR.' || '' }}
            ${{ github.event.action == 'synchronize' && format('Run `gh api repos/{0}/compare/{1}...{2}` to see what changed since the last review.', github.repository, github.event.before, github.event.after) || '' }}
            ${{ github.event.action == 'synchronize' && 'Check existing PR comments with `gh pr view --comments`.' || '' }}

            The PR branch is already checked out in the current working directory.
            Only post GitHub comments, use `gh pr comment`.
