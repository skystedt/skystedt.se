name: Reusable - Scan OWASP Dependency Check

on:
  workflow_call:
    inputs:
      upload-sarif:
        description: Upload the SARIF result to code scanning
        type: boolean
        default: true
      report-pull-request:
        description: Open, update, or close the tracking pull request based on the result
        type: boolean
        default: true
      fail-on-vulnerable:
        description: Fail the workflow when vulnerabilities are found
        type: boolean
        default: false

# permissions are inherited from the caller

env:
  SRC_DIR: "src"
  REPORT_NAME: "dependency-check-report"
  SUPPRESSION_FILE: ".github/dependency-check/suppression.xml"
  IMAGE: "owasp/dependency-check-action:latest" # Rebuilt nightly with an updated NVD dataset, so version is not pinned

jobs:
  scan:
    name: Scan Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0

      - name: Scan For Vulnerabilities
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            "$IMAGE" \
            --scan "/src/$SRC_DIR" \
            --format JSON \
            --format HTML \
            --format SARIF \
            --out "/src/$REPORT_NAME" \
            --suppression "/src/$SUPPRESSION_FILE" \
            --noupdate
          cat "$REPORT_NAME/$REPORT_NAME.json"

      - name: Upload Report
        id: upload-report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # 7.0.1
        with:
          path: ${{ env.REPORT_NAME }}/${{ env.REPORT_NAME }}.html
          archive: false

      - name: Upload SARIF
        if: ${{ inputs.upload-sarif }}
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # 4.37.1
        with:
          sarif_file: ${{ env.REPORT_NAME }}/${{ env.REPORT_NAME }}.sarif
          category: owasp-dependency-check

      - name: Evaluate Scan Result
        id: evaluate
        env:
          REPORT_URL: ${{ steps.upload-report.outputs.artifact-url }}
        run: |
          SUMMARY=$(jq -c '[.dependencies[]? | select(.vulnerabilities) | {fileName, filePath, vulnerabilities: [.vulnerabilities[] | {name, severity}]}]' "$REPORT_NAME/$REPORT_NAME.json")

          VULNERABLE=$(jq -r '[.[].vulnerabilities[]] | length' <<< "$SUMMARY")
          echo "vulnerable=$VULNERABLE" >> "$GITHUB_OUTPUT"
          echo "Found $VULNERABLE vulnerabilities"

          {
            echo "summary<<EOF_SUMMARY"
            echo "Full report: $REPORT_URL"
            echo '```'
            jq . <<< "$SUMMARY"
            echo '```'
            echo "EOF_SUMMARY"
          } >> "$GITHUB_OUTPUT"

      - name: Fail If Vulnerable
        if: ${{ inputs.fail-on-vulnerable && steps.evaluate.outputs.vulnerable != '0' }}
        env:
          SUMMARY: ${{ steps.evaluate.outputs.summary }}
        run: |
          {
            echo "## Vulnerabilities found by OWASP Dependency-Check"
            echo "$SUMMARY"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::error::OWASP Dependency-Check found ${{ steps.evaluate.outputs.vulnerable }} vulnerabilities"
          exit 1

      - name: Report Pull Request
        if: ${{ inputs.report-pull-request }}
        uses: ./.github/composite/report-pull-request
        with:
          branch-name: "vulnerability-scan/owasp-dependency-check"
          open: ${{ steps.evaluate.outputs.vulnerable != '0' }}
          title: "Vulnerabilities found by OWASP Dependency-Check"
          summary: ${{ steps.evaluate.outputs.summary }}
