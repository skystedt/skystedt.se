name: Reusable - Report Pull Request

on:
  workflow_call:
    inputs:
      branch-name:
        type: string
        required: true
      open:
        type: boolean
        required: true
      title:
        type: string
        required: true
      summary:
        type: string
        required: true
  workflow_dispatch:
    inputs:
      branch-name:
        type: string
        required: true
      open:
        type: boolean
        required: true
      title:
        type: string
        required: true
      summary:
        type: string
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  pull-request:
    name: Pull Request
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ github.token }}
      SUMMARY: ${{ inputs.summary }} # via env, not inlined: avoids script injection from scan output

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0

      - name: Check For Existing Pull Request
        id: check-pr
        run: |
          EXISTING_PR=$(gh pr list --head "${{ inputs.branch-name }}" --state open --json number --jq '.[0].number // empty')
          echo "EXISTING_PR=$EXISTING_PR" >> "$GITHUB_ENV"
          echo "Existing PR: $EXISTING_PR"

      - name: Create Branch
        if: env.EXISTING_PR == '' && inputs.open
        run: |
          git config user.name 'GitHub Actions'
          git config user.email 'actions@github.com'
          git checkout -b "${{ inputs.branch-name }}"
          git commit --allow-empty -m "${{ inputs.title }} [skip ci]"
          git push origin "${{ inputs.branch-name }}"

      - name: Create Pull Request
        if: env.EXISTING_PR == '' && inputs.open
        run: |
          BODY=$'## ${{ inputs.title }}\n'"${SUMMARY}"
          gh pr create --base main --head "${{ inputs.branch-name }}" --title "${{ inputs.title }}" --body "$BODY"

      - name: Comment on Existing Pull Request
        if: env.EXISTING_PR != '' && inputs.open
        run: |
          BODY=$'## ${{ inputs.title }} (Updated)\n'"${SUMMARY}"
          gh pr comment "$EXISTING_PR" --body "$BODY"

      - name: Close Existing Pull Request
        if: env.EXISTING_PR != '' && !inputs.open
        run: |
          COMMENT='No longer relevant. Closing this pull request.'
          gh pr close "$EXISTING_PR" --comment "$COMMENT" --delete-branch
