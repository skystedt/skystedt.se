name: Reusable - AI Review Claude

on:
  workflow_call:
    inputs:
      pr_number:
        type: number
        required: true

env:
  CLAUDE_MODEL: sonnet
  CLAUDE_EFFORT: xhigh

jobs:
  claude:
    name: &claude_job_name Claude Code
    runs-on: ubuntu-latest
    outputs:
      execution_file: ${{ steps.claude.outputs.execution_file }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
        with:
          fetch-depth: 0 # full history so the review can diff against previously reviewed commits

      - name: Claude Code
        id: claude
        uses: anthropics/claude-code-action@af0559ee4f514d1ef21826982bed13f7edc3c35e # v1.0.178
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: |
            dependabot[bot]
          claude_args: |
            --allowedTools "
              WebSearch,
              Bash(gh pr comment:*),
              Bash(gh pr diff:*),
              Bash(gh pr view:*),
              Bash(gh pr checks:*),
              Bash(gh api */compare/*),
              Bash(git fetch:*),
              Bash(git diff:*),
              Bash(git log:*),
              Bash(git show:*),
              Bash(git ls-remote:*)"
            --model ${{ env.CLAUDE_MODEL }}
            --effort ${{ env.CLAUDE_EFFORT }}
            --append-system-prompt "
              You are reviewing a pull request.

              The PR branch is already checked out in the current working directory.
              Use 'gh pr diff' to see the full set of changes.
              The full git history is available locally: use 'git log' and 'git show' for commit history and previous file versions, do not use 'gh api' for those.
              Do not try to build, run or validate the project locally; review from the source alone.

              If the prompt includes a compare command, the PR was updated after it was already reviewed: check existing PR comments with 'gh pr view --comments'.

              Always post one GitHub comment with the result, use 'gh pr comment'.
              Start the comment with an italic line stating the exact model you are running as and the effort level, e.g. _Model: claude-sonnet-x-x (effort)_

              You are running with effort: ${{ env.CLAUDE_EFFORT }}."
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ inputs.pr_number }}

            Please review this pull request.

            ${{ github.event.action == 'synchronize' && format('Run `gh api repos/{0}/compare/{1}...{2}` to see what changed since the last review.', github.repository, github.event.before, github.event.after) || '' }}

      - name: Upload Execution Transcript
        if: always() && steps.claude.outputs.execution_file != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # 7.0.1
        with:
          name: claude-execution-transcript
          path: ${{ steps.claude.outputs.execution_file }}
          retention-days: 7

      - name: Comment - Usage Limit
        if: failure() && steps.claude.outputs.execution_file != ''
        env:
          GH_TOKEN: ${{ github.token }}
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          RATE_LIMITED=$(jq -r 'any(.[]; .type == "rate_limit_event" and .rate_limit_info.status == "rejected")' "$EXECUTION_FILE") || true
          if [ "$RATE_LIMITED" = "true" ]; then
            REASON=$(jq -r '[.[] | select(.type == "result") | .result // empty] | first // "Usage limit reached"' "$EXECUTION_FILE")

            BODY=$(
              echo ":warning: Claude review did not run, the usage limit was reached."
              echo ""
              echo '```'
              echo "$REASON"
              echo '```'
            )
            gh pr comment "${{ inputs.pr_number }}" --repo "$GITHUB_REPOSITORY" --body "$BODY"
          fi

  comment_skipped:
    name: Comment - Skipped Review
    runs-on: ubuntu-latest
    needs: claude
    if: needs.claude.outputs.execution_file == ''
    steps:
      - name: Comment
        env:
          GH_TOKEN: ${{ github.token }}
          CLAUDE_JOB_NAME: *claude_job_name
        run: |
          JOB_ID=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/attempts/$GITHUB_RUN_ATTEMPT/jobs" \
            --jq '[.jobs[] | select((.name | split(" / ") | last) == env.CLAUDE_JOB_NAME)][0].id') || true

          JOB_LOG=$(gh api "repos/$GITHUB_REPOSITORY/actions/jobs/$JOB_ID/logs") || true

          # warning lines look like: <timestamp> ##[warning]<message>
          REASON=$(echo "$JOB_LOG" | grep -i '##\[warning\].*workflow validation' | head -n1 | sed 's/^[^ ]* ##\[warning\]//' | tr -d '\r') || true

          if [ -z "$JOB_LOG" ]; then
            REASON="Could not read the job log"
          elif [ -z "$REASON" ]; then
            REASON="No workflow validation warning found in the job log"
          fi

          BODY=$(
            echo ":warning: Claude review did not run, the action exited without reviewing."
            echo ""
            echo '```'
            echo "$REASON"
            echo '```'
          )
          gh pr comment "${{ inputs.pr_number }}" --repo "$GITHUB_REPOSITORY" --body "$BODY"
