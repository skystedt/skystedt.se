name: AI Review - Local LLM

concurrency:
  group: ai-review-local-${{ github.event.pull_request.number }}
  cancel-in-progress: true

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Local LLM
    uses: ./.github/workflows/reusable-ai-review-local.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
      notify_offline: true
    secrets: inherit
