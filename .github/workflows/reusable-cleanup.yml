name: Reusable - Cleanup

on:
  workflow_call:
    inputs:
      pr_number:
        type: number
        required: true
  workflow_dispatch:
    inputs:
      pr_number:
        type: number
        required: true

permissions:
  {}

jobs:
  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: ${{ format('refs/pull/{0}/merge', inputs.pr_number) }}
    steps:
      - name: Azure Static Web Apps - Close
        uses: Azure/static-web-apps-deploy@4d27395796ac319302594769cfe812bd207490b1 # 1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
