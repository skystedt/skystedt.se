name: Reusable - Cleanup

on:
  workflow_call:
    inputs:
      pr_number:
        type: number
        required: true
  workflow_dispatch:
    inputs:
      pr_number:
        type: number
        required: true

permissions:
  id-token: write
  
env:
  SWA_NAME: "skystedt"

jobs:
  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # 3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Azure Static Web Apps - Close
        run: |
          DELETE_OUTPUT=$(az staticwebapp environment delete --name ${{ env.SWA_NAME }} --environment-name ${{ inputs.pr_number }} --yes 2>&1) || DELETE_EXIT=$?
          if [ ${DELETE_EXIT:-0} -ne 0 ]; then
            if echo "$DELETE_OUTPUT" | grep -q "Microsoft.Web/locations/staticSitesOperationStatuses/read"; then
              echo "Ignored error: $DELETE_OUTPUT"
            else
              echo "Error deleting static web app environment:"
              echo "$DELETE_OUTPUT"
              exit ${DELETE_EXIT}
            fi
          fi

      - name: Azure Logout
        if: always()
        run: az logout
