name: Schedule - Scan NuGet Transitive Dependencies

on:
  schedule:
    # Run daily at 11:45 UTC, to match other scans
    - cron: "45 11 * * *"
  workflow_dispatch:

permissions: {} # permissions are specified on each job

jobs:
  scan:
    name: Scan NuGet Transitive Dependencies
    permissions:
      contents: write
      security-events: write
      pull-requests: write
    uses: ./.github/workflows/reusable-scan-nuget-transitive-dependencies.yml
    with:
      upload-sarif: true
      report-pull-request: true
