name: Schedule - Scan Nuget Transitive Dependencies

on:
  schedule:
    # Run every Saturday at 08:00 UTC (09:00 CET/10:00 CEST), matching Dependabot nuget schedule
    - cron: "0 8 * * 6"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  SRC_DIR: "src"
  BRANCH_NAME: "vulnerability-scan/nuget-transitive-dependencies"
  OUTPUT_FILE_NAME: "vulnerable.json"

jobs:
  scan:
    name: Scan Nuget Transitive Dependencies
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.SRC_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0

      - name: Dotnet Setup
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # 5.3.0
        with:
          global-json-file: ${{ env.SRC_DIR }}/global.json

      - name: Dotnet Restore
        run: dotnet restore

      - name: Scan For Vulnerable Packages
        run: |
          dotnet list package --vulnerable --include-transitive --format json --no-restore > ${{ env.OUTPUT_FILE_NAME }} || true
          cat ${{ env.OUTPUT_FILE_NAME }}

      - name: Evaluate Scan Result
        id: evaluate
        run: |
          VULNERABLE=$(jq -r '[.projects[]?.frameworks[]?.transitivePackages[]] | length' ${{ env.OUTPUT_FILE_NAME }})
          echo "VULNERABLE=$VULNERABLE" >> "$GITHUB_ENV"
          echo "Found $VULNERABLE vulnerable transitive dependencies"

      - name: Check For Existing Pull Request
        id: check-pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING_PR=$(gh pr list --head "$BRANCH_NAME" --state open --json number --jq '.[0].number')
          echo "EXISTING_PR=$EXISTING_PR" >> "$GITHUB_ENV"
          echo "Existing PR: $EXISTING_PR"

      - name: Create Branch
        if: env.VULNERABLE != '0' && env.EXISTING_PR == ''
        run: |
          git config user.name 'GitHub Actions'
          git config user.email 'actions@github.com'
          git checkout -b "$BRANCH_NAME"
          git commit --allow-empty -m "Vulnerable Nuget transitive dependency [skip ci]"
          git push origin "$BRANCH_NAME"

      - name: Create Pull Request
        if: env.VULNERABLE != '0' && env.EXISTING_PR == ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VULNERABLE_JSON=$(cat ${{ env.OUTPUT_FILE_NAME }})
          BODY=$'## Vulnerabilities Found in Transitive Dependencies\n```\n'"${VULNERABLE_JSON}"$'\n```'
          gh pr create --base main --head "$BRANCH_NAME" --title "Vulnerabilities found in transitive dependencies" --body "$BODY"

      - name: Comment on Existing Pull Request
        if: env.VULNERABLE != '0' && env.EXISTING_PR != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VULNERABLE_JSON=$(cat ${{ env.OUTPUT_FILE_NAME }})
          BODY=$'## Updated Vulnerabilities Found in Transitive Dependencies\n```\n'"${VULNERABLE_JSON}"$'\n```'
          gh pr comment "$EXISTING_PR" --body "$BODY"

      - name: Close Existing Pull Request
        if: env.VULNERABLE == '0' && env.EXISTING_PR != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr close "$EXISTING_PR" --comment "No vulnerabilities found in transitive dependencies. Closing this PR."
