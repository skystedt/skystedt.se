name: Reusable - Dependency Review

on:
  workflow_call:

env:
  CLIENT_LICENSES_FILE: "src/Client/licenses.json"
  CLIENT_LICENSES_FIELD: ".allowed.used"
  API_LICENSES_FILE: "src/licenses.json"
  API_LICENSES_FIELD: ".allowed"

permissions:
  contents: read

jobs:
  dependency_review:
    name: Dependency Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0

      - name: Read Allow-Licenses
        id: licenses
        run: |
          ALLOW_LICENSES=$(jq -rn \
            --slurpfile client "${{ env.CLIENT_LICENSES_FILE }}" \
            --slurpfile api "${{ env.API_LICENSES_FILE }}" \
            '($client[0]${{ env.CLIENT_LICENSES_FIELD }} + $api[0]${{ env.API_LICENSES_FIELD }}) | join(", ")')
          echo "allow-licenses=$ALLOW_LICENSES" >> "$GITHUB_OUTPUT"
          echo "Allowed licenses: $ALLOW_LICENSES"

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # 5.0.0
        with:
          allow-licenses: ${{ steps.licenses.outputs.allow-licenses }}
