version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "10:00"
      timezone: "Europe/Stockholm"
    groups:
      github-actions:
        patterns:
          - "actions/*"
      codeql:
        patterns:
          - "github/codeql-action/*"

  - package-ecosystem: "dotnet-sdk"
    directory: "/src"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "10:00"
      timezone: "Europe/Stockholm"

  - package-ecosystem: "nuget"
    directory: "/src"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "10:00"
      timezone: "Europe/Stockholm"
    groups:
      api:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/src/Client"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "10:00"
      timezone: "Europe/Stockholm"
    open-pull-requests-limit: 10
    groups:
      babel:
        patterns:
          - "@babel/*"
          - "babel-*"
      client-development:
        dependency-type: "development"
        update-types:
          - minor
          - patch

  - package-ecosystem: "npm"
    directory: "/.github/deploy"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "10:00"
      timezone: "Europe/Stockholm"
